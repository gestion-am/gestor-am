 <!-- gestor-am/index.html -->

 <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>GESTOR-AM - Login</title>
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/styles.css" />

  <script defer src="js/app.js"></script>
</head>

<body class="body-login">
  <!-- SOLO un contenedor -->
  <div class="login-container">
      <!-- SOLO un cuadro (este) -->
      <div class="login-card login-card--center">
        <!-- SOLO un logo (este) -->
        <div class="login-card-logo">
          <img src="assets/gestor-am-logo.png" alt="Logo GESTOR-AM" />
        </div>

        <form id="login-form">
          <div class="form-group">
            <label for="login-username">Usuario</label>
            <input id="login-username" type="text" autocomplete="off" maxlength="20" />
          </div>

          <div class="form-group">
            <label for="login-password">Contraseña</label>
            <div class="input-with-icon">
              <input id="login-password" type="password" />
              <button
                type="button"
                class="toggle-password hidden-eye"
                data-target="login-password"
                aria-label="Mostrar u ocultar contraseña"
              >
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>

          <p id="login-error" class="error-message"></p>

          <button type="submit" class="btn primary full-width">
            Entrar
          </button>
        </form>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
</body>
</html>
